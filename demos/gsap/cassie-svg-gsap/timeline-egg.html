<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Egg</title>
</head>

<body>
  <svg viewBox="0 0 200 200" preserveAspectRatio="xMidYMid meet">
    <circle id="circle" cx="-10" cy="25" r="5" />
  </svg>
  <script src="https://cdn.jsdelivr.net/npm/gsap@3.15/dist/gsap.min.js"></script>

  <script>
    const tl = gsap.timeline()

    tl.to("#circle", {
      scaleY: 1.2,
      rotate: -30
    }).to("#circle", {
      x: 50,
      y: 80,
      rotate: -30,
      scaleY: 1.2,
      duration: 0.15,
      ease: "bounce.out"
    }).to("#circle", {
      scaleX: 1.5,
      duration: 0.01
    }).to("#circle", {
      x: 90,
      y: 40,
      duration: 0.2
    }).to("#circle", {
      rotate: 0,
      y: 25,
      x: 95,
      duration: 0.1,
      transformOrigin: "top left"
    }).to("#circle", {
      y: -10,
      x: 100,
      scaleX: 2,
      scaleY: 3,
      duration: 0.3,
      ease: "back.out(1.5)"
    }).to("#circle", {
      y: 70,
      ease: "bounce.out"
    }, '+=0.05').to("#circle", {
      x: 140,
      rotate: 180,
      transformOrigin: "center",
      duration: 1,
      ease: "back.out(1)"
    })
  </script>
</body>

</html>
