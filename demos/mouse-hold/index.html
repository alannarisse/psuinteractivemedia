<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      font-size: 32px;
      margin: 0;
    }

    section {
      padding: 100px;
      width: 100vw;
      height: 100vh;
      border-bottom: 1px solid black;
    }

    #button-press {
      padding: 18px 24px;
      border-radius: 12px;
      background: fuchsia;
      color: navy;
      border: 2px solid navy;
      position: absolute;
      top: 200px;
      left: 40%;
      z-index: 1;
    }

    .hide {
      display: none;
    }

    body {
      background: #0798eb;
    }

    .shape-overlays {
      width: 100%;
      height: 100%;
      position: fixed;
      top: 0;
      left: 0;
      cursor: pointer;
    }
  </style>
</head>

<body>
  <section id="start">
    <a href="#" id="button-press">press hold to start</a>

    <svg class="shape-overlays" viewBox="0 0 100 100" preserveAspectRatio="none">
      <defs>
        <!--    orange crush -->
        <linearGradient id="gradient1" x1="0%" y1="0%" x2="0%" y2="100%">
          <stop offset="0%" stop-color="#ff8709" />
          <stop offset="100%" stop-color="#f7bdf8" />
        </linearGradient>
        <!--     svg  gradient -->
        <linearGradient id="gradient2" x1="0%" y1="0%" x2="0%" y2="100%">
          <stop offset="0%" stop-color="#ffd9b0" />
          <stop offset="100%" stop-color="#ff8709" />
        </linearGradient>
      </defs>
      <path class="shape-overlays__path" fill="url(#gradient2)"></path>
      <path class="shape-overlays__path" fill="url(#gradient1)"></path>
    </svg>


  </section>
  <section id="first" class="hide">
    <p>All the awesome content</p>
  </section>
  <script src="https://cdn.jsdelivr.net/npm/gsap@3.15/dist/gsap.min.js"></script>


  <script src="https://code.jquery.com/jquery-4.0.0.min.js"
    integrity="sha256-OaVG6prZf4v69dPg6PhVattBXkcOWQB62pdZ3ORyrao=" crossorigin="anonymous"></script>

  <script>


    $('#button-press').on('mousedown', function (e) {
      pressedDown = true;
      setTimeout(function () {
        $('#first').removeClass('hide')
        $('#start').addClass('hide')
        //alert('three seconds!')

      }, 3000);
    })
  </script>

  <script>
    // forked from the hero Blake bowen https://codepen.io/osublake/pen/BYwgBg & added GSAP gradients.

    console.clear();

    let overlay = document.querySelector(".shape-overlays");
    let paths = document.querySelectorAll(".shape-overlays__path");

    let numPoints = 10;
    let numPaths = paths.length;
    let delayPointsMax = 0.3;
    let delayPerPath = 0.25;
    let duration = 0.9;
    let isOpened = false;
    let pointsDelay = [];
    let allPoints = [];

    let tl = gsap.timeline({
      onUpdate: render,
      defaults: {
        ease: "power2.inOut",
        duration: 3
      }
    });

    for (let i = 0; i < numPaths; i++) {
      let points = [];
      allPoints.push(points);
      for (let j = 0; j < numPoints; j++) {
        points.push(100);
      }
    }

    overlay.addEventListener("click", onClick);
    toggle();

    function onClick() {

      if (!tl.isActive()) {
        isOpened = !isOpened;
        toggle();
      }
    }

    function toggle() {

      tl.progress(0).clear();

      for (let i = 0; i < numPoints; i++) {
        pointsDelay[i] = Math.random() * delayPointsMax;
      }

      for (let i = 0; i < numPaths; i++) {
        let points = allPoints[i];
        let pathDelay = delayPerPath * (isOpened ? i : (numPaths - i - 1));

        for (let j = 0; j < numPoints; j++) {
          let delay = pointsDelay[j];
          tl.to(points, {
            [j]: 0
          }, delay + pathDelay);
        }
      }
    }

    function render() {

      for (let i = 0; i < numPaths; i++) {
        let path = paths[i];
        let points = allPoints[i];

        let d = "";
        d += isOpened ? `M 0 0 V ${points[0]} C` : `M 0 ${points[0]} C`;

        for (let j = 0; j < numPoints - 1; j++) {

          let p = (j + 1) / (numPoints - 1) * 100;
          let cp = p - (1 / (numPoints - 1) * 100) / 2;
          d += ` ${cp} ${points[j]} ${cp} ${points[j + 1]} ${p} ${points[j + 1]}`;
        }

        d += isOpened ? ` V 100 H 0` : ` V 0 H 0`;
        path.setAttribute("d", d)
      }
    }
  </script>
</body>

</html>
