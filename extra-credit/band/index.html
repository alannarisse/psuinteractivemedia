<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Band</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
    }

    main {
      width: 80vw;
      margin: auto;
      padding: 2rem;
    }

    svg {
      width: 100%;
      height: auto;
    }


    #lionarm {
      animation-name: lion-arm-play;
      animation-timing-function: ease-in-out;
      animation-fill-mode: both;
      animation-duration: 500ms;
      animation-iteration-count: infinite;
      transform-origin: center center;
    }

    #lion-low-arm {
      animation-name: lion-arm-play;
      animation-timing-function: ease-in-out;
      animation-fill-mode: both;
      animation-duration: 500ms;
      animation-iteration-count: infinite;
      transform-origin: center center;
      animation-delay: 250ms;
    }

    #lion-head {
      transform-origin: center center;
      animation-name: head-rotate;
      animation-duration: 500ms;
      animation-fill-mode: both;
      animation-iteration-count: infinite;
    }

    #fox-head {
      transform-origin: center center;
      animation-name: fox-head-animation;
      animation-duration: 500ms;
      animation-fill-mode: both;
      animation-iteration-count: infinite;
      animation-timing-function: ease-in-out;
      animation-delay: 250ms;
    }

    @keyframes fox-head-animation {
      0% {
        transform: skew(0deg, 0deg) rotate(0deg);
      }

      100% {
        transform: skew(1deg, 1deg) rotate(1deg);
      }
    }

    @keyframes lion-arm-play {
      0% {
        transform: skew(0deg, 0deg) rotate(0deg);
      }

      100% {
        transform: skew(1deg, 1deg) rotate(3deg);
      }
    }

    @keyframes head-rotate {
      0% {
        transform: rotate(5deg);
      }

      100% {
        transform: rotate(-5deg);
      }
    }
  </style>
</head>
